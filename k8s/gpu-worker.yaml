apiVersion: apps/v1
kind: Deployment
metadata:
  name: visionstudio-gpu
  namespace: visionstudio
  labels:
    app: gpu-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gpu-worker
  template:
    metadata:
      labels:
        app: gpu-worker
    spec:
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-tesla-a100
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      containers:
      - name: gpu-worker
        image: visionstudio/gpu-worker:v1.0.0
        ports:
        - containerPort: 8001
          name: http
        envFrom:
        - secretRef:
            name: visionstudio-secrets
        resources:
          limits:
            nvidia.com/gpu: 1
            memory: "16Gi"
            cpu: "4000m"
          requests:
            memory: "8Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 60
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: gpu-worker-service
  namespace: visionstudio
spec:
  selector:
    app: gpu-worker
  ports:
  - port: 80
    targetPort: 8001
  type: ClusterIP
