version: "3.8"

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - visionstudio

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://visionstudio:visionstudio@db:5432/visionstudio
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - STORAGE_PROVIDER=r2
      - ENV=production
    depends_on:
      - db
      - redis
    networks:
      - visionstudio
    deploy:
      replicas: 2

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker -Q generation,editing,animation -l info -c 2
    environment:
      - DATABASE_URL=postgresql+asyncpg://visionstudio:visionstudio@db:5432/visionstudio
      - REDIS_URL=redis://redis:6379/0
      - GPU_WORKER_URL=http://gpu-worker:8001
    depends_on:
      - db
      - redis
    networks:
      - visionstudio

  gpu-worker:
    build:
      context: ../gpu-worker
      dockerfile: Dockerfile
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    ports:
      - "8001:8001"
    networks:
      - visionstudio

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=visionstudio
      - POSTGRES_PASSWORD=visionstudio
      - POSTGRES_DB=visionstudio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - visionstudio

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - visionstudio

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - visionstudio

volumes:
  postgres_data:
  redis_data:

networks:
  visionstudio:
    driver: bridge
